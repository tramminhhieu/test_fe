name: Full React CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ========================
      # 1. Lint check (ESLint)
      # ========================
      - name: Run ESLint
        run: npm run lint

      # ========================
      # 2. Type check (TypeScript)
      # ========================
      - name: Type check
        run: npm run type-check

      # ========================
      # 3. Format check (Prettier)
      # ========================
      - name: Format check
        run: npm run format:check

      # ========================
      # 4. Unit tests
      # ========================
      - name: Run tests
        run: npm test -- --watchAll=false

      # ========================
      # 5. Build project
      # ========================
      - name: Build project
        run: npm run build